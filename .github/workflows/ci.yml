name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            tui-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run CI
        run: npm run ci

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell script syntax check
        run: |
          for f in packaging/macos/*.sh packaging/build-macos.sh packaging/scripts/doctor.sh packaging/debian/postinst; do
            bash -n "$f"
          done
      - name: Packaging assertion tests
        run: bash packaging/scripts/test-packaging-scripts.sh

  build-linux-deb:
    name: Build Linux .deb package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            tui-web/package-lock.json
      - name: Verify Docker is available
        run: docker --version
      - name: Build Linux amd64 .deb
        run: |
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh --docker 0.0.0+pr.${{ github.event.pull_request.number || github.run_number }} amd64
        env:
          NODE_VERSION: '22.15.0'
      - name: Upload Linux package artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-serve-linux-amd64-deb
          path: packaging/dist/*.deb
          if-no-files-found: error

  build-macos:
    name: Build macOS arm64 bundle
    runs-on: macos-14-arm64
    env:
      MACOSX_DEPLOYMENT_TARGET: '12.0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            tui-web/package-lock.json
      - name: Build macOS bundle
        run: |
          chmod +x packaging/build-macos.sh
          ./packaging/build-macos.sh 0.0.0+pr.${{ github.event.pull_request.number || github.run_number }}
        env:
          NODE_VERSION: '22.15.0'
      - name: Upload macOS bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-serve-macos-arm64
          path: |
            packaging/dist/*.tar.gz
            packaging/dist/*.sha256
          if-no-files-found: error
