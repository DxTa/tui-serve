name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            tui-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run CI
        run: npm run ci

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell script syntax check
        run: |
          for f in packaging/macos/*.sh packaging/build-macos.sh packaging/scripts/doctor.sh packaging/debian/postinst; do
            bash -n "$f"
          done
      - name: Packaging assertion tests
        run: bash packaging/scripts/test-packaging-scripts.sh

  build-linux-deb:
    name: Build Linux .deb package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            tui-web/package-lock.json
      - name: Verify Docker is available
        run: docker --version
      - name: Build Linux amd64 .deb
        run: |
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh --docker 0.0.0+pr.${{ github.event.pull_request.number || github.run_number }} amd64
        env:
          NODE_VERSION: '22.15.0'
      - name: Upload Linux package artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-serve-linux-amd64-deb
          path: packaging/dist/*.deb
          if-no-files-found: error

  build-macos:
    name: Build macOS arm64 bundle
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: '12.0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            tui-web/package-lock.json
      - name: Build macOS bundle
        run: |
          chmod +x packaging/build-macos.sh
          ./packaging/build-macos.sh 0.0.0+pr.${{ github.event.pull_request.number || github.run_number }}
        env:
          NODE_VERSION: '22.15.0'
      - name: Upload macOS bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-serve-macos-arm64
          path: |
            packaging/dist/*.tar.gz
            packaging/dist/*.sha256
          if-no-files-found: error

  # ── Smoke-test: user-mode install (no sudo), start server, health + session ──
  smoke-test-macos:
    name: macOS smoke test (user mode)
    needs: build-macos
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: '12.0'
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: tui-serve-macos-arm64
          path: packaging/dist/

      - name: Extract bundle
        run: |
          cd packaging/dist
          tar xzf tui-serve-*-macos-arm64.tar.gz
          ls -la tui-serve-*-macos-arm64/

      - name: Install tmux
        run: brew install tmux

      - name: Install tui-serve (--user mode, no sudo)
        run: |
          BUNDLE_DIR="$(ls -d packaging/dist/tui-serve-*-macos-arm64)"
          chmod +x "$BUNDLE_DIR/deploy/scripts/install-macos.sh"
          TUI_SERVE_NONINTERACTIVE=1 BIND_HOST=127.0.0.1 \
            "$BUNDLE_DIR/deploy/scripts/install-macos.sh" --user

      - name: Verify install and start server
        run: |
          echo "=== Install mode marker ==="
          cat ~/.local/opt/tui-serve/.install-mode
          echo ""
          echo "=== Installed files ==="
          ls ~/.local/opt/tui-serve/
          echo ""
          echo "=== Config ==="
          cat ~/.config/tui-serve/env
          echo ""
          echo "=== Launcher wrapper path check ==="
          head -5 ~/.local/opt/tui-serve/bin/tui-serve.sh

          # Extract auth token for API tests
          AUTH_TOKEN=$(grep '^AUTH_TOKEN=' ~/.config/tui-serve/env | cut -d= -f2)
          echo "AUTH_TOKEN=${AUTH_TOKEN}" >> "$GITHUB_ENV"

          # Start server via launcher wrapper
          source ~/.config/tui-serve/env
          ~/.local/opt/tui-serve/bin/tui-serve.sh &
          SERVER_PID=$!
          echo "SERVER_PID=${SERVER_PID}" >> "$GITHUB_ENV"

          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5555/api/health >/dev/null 2>&1; then
              echo "Server is ready (attempt $i)"
              break
            fi
            echo "  waiting... ($i/30)"
            sleep 1
          done

      - name: Verify health endpoint
        run: |
          echo "=== Health check ==="
          curl -sf http://127.0.0.1:5555/api/health | python3 -m json.tool
          STATUS=$(curl -sf http://127.0.0.1:5555/api/health | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" != "ok" ]; then
            echo "❌ Health check failed: status=$STATUS"
            exit 1
          fi
          echo "✅ Server health: $STATUS"

      - name: Verify web UI
        run: |
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5555/)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Web UI returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Web UI returned HTTP $HTTP_CODE"
          BODY=$(curl -sf http://127.0.0.1:5555/)
          if echo "$BODY" | grep -q "tui-serve\|TUI Serve\|<title>"; then
            echo "✅ Web UI has expected content"
          else
            echo "⚠️  Web UI may be missing expected content"
          fi

      - name: Test session API
        run: |
          echo "=== Create test session ==="
          # commandId 'pi' maps to the 'pi' binary which doesn't exist on CI.
          # The API works correctly — tmux attach fails because the command
          # isn't installed. Accept ATTACH_FAILED as expected CI behavior.
          SESSION=$(curl -s -w '\n%{http_code}' -X POST http://127.0.0.1:5555/api/sessions \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"title":"ci-test","commandId":"pi","cwd":"/tmp"}')
          HTTP_CODE=$(echo "$SESSION" | tail -1)
          BODY=$(echo "$SESSION" | sed '$d')
          echo "Response ($HTTP_CODE): $BODY"
          if [ "$HTTP_CODE" = "200" ] || [ "$HTTP_CODE" = "201" ]; then
            SESSION_ID=$(echo "$BODY" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
            echo "✅ Created session: $SESSION_ID"
            # List sessions
            curl -s http://127.0.0.1:5555/api/sessions \
              -H "Authorization: Bearer ${AUTH_TOKEN}" | python3 -m json.tool
            # Kill session
            curl -s -X POST "http://127.0.0.1:5555/api/sessions/${SESSION_ID}/kill" \
              -H "Authorization: Bearer ${AUTH_TOKEN}" \
              -H "Content-Type: application/json" \
              -d '{"confirm":true}'
            echo "✅ Session killed"
          elif echo "$BODY" | grep -q 'ATTACH_FAILED\|command not found\|tmux'; then
            echo "✅ Session API works (attach failed as expected on CI — command not installed)"
          else
            echo "❌ Session API returned unexpected error: HTTP $HTTP_CODE"
            echo "$BODY"
            exit 1
          fi

      - name: Run doctor script
        run: |
          echo "=== Running doctor script ==="
          ~/.local/opt/tui-serve/deploy/scripts/doctor-macos.sh || {
            echo "⚠️  Doctor reported issues (non-fatal for CI)"
          }

      - name: Capture server logs
        if: always()
        run: |
          echo "=== Server process ==="
          ps aux | grep tui-serve || true
          echo ""
          echo "=== Server logs ==="
          cat ~/Library/Logs/tui-serve/tui-serve.log 2>/dev/null | tail -20 || true
          echo ""
          echo "=== Server error logs ==="
          cat ~/Library/Logs/tui-serve/tui-serve.err 2>/dev/null | tail -20 || true

      - name: Stop server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ]; then
            kill "${SERVER_PID}" 2>/dev/null || true
            sleep 1
            kill -9 "${SERVER_PID}" 2>/dev/null || true
          fi