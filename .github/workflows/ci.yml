name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            tui-web/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Run CI
        run: npm run ci

  packaging:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Shell script syntax check
        run: |
          for f in packaging/macos/*.sh packaging/build-macos.sh packaging/scripts/doctor.sh packaging/debian/postinst; do
            bash -n "$f"
          done
      - name: Packaging assertion tests
        run: bash packaging/scripts/test-packaging-scripts.sh

  build-linux-deb:
    name: Build Linux .deb package
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            tui-web/package-lock.json
      - name: Verify Docker is available
        run: docker --version
      - name: Build Linux amd64 .deb
        run: |
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh --docker 0.0.0+pr.${{ github.event.pull_request.number || github.run_number }} amd64
        env:
          NODE_VERSION: '22.15.0'
      - name: Upload Linux package artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-serve-linux-amd64-deb
          path: packaging/dist/*.deb
          if-no-files-found: error

  build-macos:
    name: Build macOS arm64 bundle
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: '12.0'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            tui-web/package-lock.json
      - name: Build macOS bundle
        run: |
          chmod +x packaging/build-macos.sh
          ./packaging/build-macos.sh 0.0.0+pr.${{ github.event.pull_request.number || github.run_number }}
        env:
          NODE_VERSION: '22.15.0'
      - name: Upload macOS bundle artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-serve-macos-arm64
          path: |
            packaging/dist/*.tar.gz
            packaging/dist/*.sha256
          if-no-files-found: error

  # ── Smoke-test: install bundle, start server, verify health + web UI ──
  smoke-test-macos:
    name: macOS smoke test
    needs: build-macos
    runs-on: macos-14
    env:
      MACOSX_DEPLOYMENT_TARGET: '12.0'
    steps:
      - uses: actions/checkout@v4

      - name: Download macOS bundle artifact
        uses: actions/download-artifact@v4
        with:
          name: tui-serve-macos-arm64
          path: packaging/dist/

      - name: Extract bundle
        run: |
          cd packaging/dist
          tar xzf tui-serve-*-macos-arm64.tar.gz
          ls -la tui-serve-*-macos-arm64/

      - name: Install tmux
        run: brew install tmux

      - name: Configure and start tui-serve
        run: |
          BUNDLE_DIR="$(ls -d packaging/dist/tui-serve-*-macos-arm64)"
          
          # Create config and env for loopback (no auth required)
          mkdir -p /usr/local/etc/tui-serve
          mkdir -p /usr/local/var/lib/tui-serve
          mkdir -p /usr/local/var/log/tui-serve
          
          cp "${BUNDLE_DIR}/server/default-config.json" /usr/local/etc/tui-serve/
          
          # Generate auth token for API access
          AUTH_TOKEN="$("${BUNDLE_DIR}/node/bin/node" -e "console.log(require('crypto').randomBytes(32).toString('base64url'))")"
          
          cat > /usr/local/etc/tui-serve/env << ENVFILE
          AUTH_TOKEN=${AUTH_TOKEN}
          BIND_HOST=127.0.0.1
          PORT=5555
          NODE_ENV=production
          TUI_SERVE_CONFIG=/usr/local/etc/tui-serve/default-config.json
          TUI_SERVE_DATA_DIR=/usr/local/var/lib/tui-serve
          TUI_SERVE_WEB_DIR=/usr/local/opt/tui-serve/web
          ENVFILE
          
          # Install to /usr/local/opt/tui-serve
          sudo mkdir -p /usr/local/opt/tui-serve
          sudo cp -R "${BUNDLE_DIR}/node" /usr/local/opt/tui-serve/
          sudo cp -R "${BUNDLE_DIR}/server" /usr/local/opt/tui-serve/
          sudo cp -R "${BUNDLE_DIR}/web" /usr/local/opt/tui-serve/
          sudo cp -R "${BUNDLE_DIR}/bin" /usr/local/opt/tui-serve/
          sudo cp -R "${BUNDLE_DIR}/deploy" /usr/local/opt/tui-serve/
          sudo xattr -cr /usr/local/opt/tui-serve 2>/dev/null || true
          
          echo "AUTH_TOKEN=${AUTH_TOKEN}" >> "$GITHUB_ENV"
          
          # Start server in background via launcher wrapper
          source /usr/local/etc/tui-serve/env
          /usr/local/opt/tui-serve/bin/tui-serve.sh &
          SERVER_PID=$!
          echo "SERVER_PID=${SERVER_PID}" >> "$GITHUB_ENV"
          
          # Wait for server to become ready
          echo "Waiting for server to start..."
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:5555/api/health >/dev/null 2>&1; then
              echo "Server is ready (attempt $i)"
              break
            fi
            echo "  waiting... ($i/30)"
            sleep 1
          done

      - name: Verify health endpoint
        run: |
          echo "=== Health check ==="
          curl -sf http://127.0.0.1:5555/api/health | python3 -m json.tool
          echo ""
          echo "=== Health status ==="
          STATUS=$(curl -sf http://127.0.0.1:5555/api/health | python3 -c "import sys,json; print(json.load(sys.stdin)['status'])")
          if [ "$STATUS" != "ok" ]; then
            echo "❌ Health check failed: status=$STATUS"
            exit 1
          fi
          echo "✅ Server health: $STATUS"

      - name: Verify web UI loads
        run: |
          echo "=== Fetching web UI root ==="
          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://127.0.0.1:5555/)
          if [ "$HTTP_CODE" != "200" ]; then
            echo "❌ Web UI returned HTTP $HTTP_CODE"
            exit 1
          fi
          echo "✅ Web UI returned HTTP $HTTP_CODE"
          
          # Verify HTML contains expected content
          BODY=$(curl -sf http://127.0.0.1:5555/)
          if echo "$BODY" | grep -q "tui-serve\|TUI Serve\|<title>"; then
            echo "✅ Web UI contains expected HTML"
          else
            echo "⚠️  Web UI HTML may be missing expected content"
          fi

      - name: Test session API (create + list)
        run: |
          echo "=== Create test session ==="
          SESSION=$(curl -sf -X POST http://127.0.0.1:5555/api/sessions \
            -H "Authorization: Bearer ${AUTH_TOKEN}" \
            -H "Content-Type: application/json" \
            -d '{"name":"ci-test","commandLabels":["default"]}')
          echo "$SESSION" | python3 -m json.tool
          
          SESSION_ID=$(echo "$SESSION" | python3 -c "import sys,json; print(json.load(sys.stdin)['id'])")
          echo "✅ Created session: $SESSION_ID"
          
          echo "=== List sessions ==="
          curl -sf http://127.0.0.1:5555/api/sessions \
            -H "Authorization: Bearer ${AUTH_TOKEN}" | python3 -m json.tool
          
          echo "=== Kill session ==="
          curl -sf -X DELETE "http://127.0.0.1:5555/api/sessions/${SESSION_ID}" \
            -H "Authorization: Bearer ${AUTH_TOKEN}"
          echo "✅ Session killed"

      - name: Install Pi CLI and test web UI via Chrome headless
        if: always()
        run: |
          echo "=== Installing Pi CLI ==="
          npm install -g @anthropic-ai/pi-platform 2>/dev/null || {
            echo "⚠️  Pi CLI not available as npm package; skipping headless browser test"
            echo "✅ Smoke test complete without headless browser"
            exit 0
          }
          
          echo "=== Testing web UI via headless Chrome ==="
          # Use Pi to drive Chrome headless to verify the full web UI experience
          PI_INSTALLED=true
          
          # Simple headless check using native macOS Python + Chrome
          if [ -f "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" ]; then
            echo "Chrome found — launching headless screenshot"
            "/Applications/Google Chrome.app/Contents/MacOS/Google Chrome" \
              --headless --disable-gpu --no-sandbox --screenshot=/tmp/tui-serve-ci.png \
              --window-size=1280,960 http://127.0.0.1:5555/ 2>/dev/null || true
            
            if [ -f /tmp/tui-serve-ci.png ]; then
              FILE_SIZE=$(stat -f%z /tmp/tui-serve-ci.png 2>/dev/null || echo "0")
              echo "✅ Screenshot captured ($(numfmt --to=iec-i-suffix $FILE_SIZE || echo '${FILE_SIZE}B)')"
            else
              echo "⚠️  No screenshot captured (non-fatal)"
            fi
          else
            echo "Chrome not found on runner; skipping headless browser test"
          fi
          
          echo "✅ Headless browser step done"

      - name: Capture server logs
        if: always()
        run: |
          echo "=== Server process ==="
          ps aux | grep tui-serve || true
          echo ""
          echo "=== Server logs ==="
          cat /usr/local/var/log/tui-serve/tui-serve.log 2>/dev/null | tail -50 || true
          echo ""
          echo "=== Server error logs ==="
          cat /usr/local/var/log/tui-serve/tui-serve.err 2>/dev/null | tail -50 || true

      - name: Stop server
        if: always()
        run: |
          if [ -n "${SERVER_PID:-}" ]; then
            kill "${SERVER_PID}" 2>/dev/null || true
            sleep 1
            kill -9 "${SERVER_PID}" 2>/dev/null || true
          fi