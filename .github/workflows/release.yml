name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  workflow_run:
    workflows: ["Bump Version"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Build .deb for Linux amd64 ──────────────────────────────
  build-deb:
    # Pin runner image; actual .deb build runs inside packaging/build-deb.sh's
    # ubuntu:20.04 Docker container for glibc compatibility.
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            tui-web/package-lock.json

      - name: Verify Docker is available
        run: docker --version

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(node -p "require('./server/package.json').version")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create and push tag (if not tag-triggered)
        if: '!startsWith(github.ref, ''refs/tags/v'')'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.VERSION }}" -m "v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: Build .deb package
        run: |
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh --docker ${{ steps.version.outputs.VERSION }} amd64
        env:
          NODE_VERSION: '22.15.0'

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-serve-${{ steps.version.outputs.VERSION }}-amd64-deb
          path: packaging/dist/*.deb
          if-no-files-found: error

  # ── Build macOS arm64 bundle ─────────────────────────────────
  build-macos:
    runs-on: macos-14  # Apple Silicon (M1)
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    env:
      MACOSX_DEPLOYMENT_TARGET: '12.0'
    needs: [build-deb]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            package-lock.json
            server/package-lock.json
            tui-web/package-lock.json

      - name: Build macOS bundle
        run: |
          chmod +x packaging/build-macos.sh
          ./packaging/build-macos.sh ${{ needs.build-deb.outputs.version }}
        env:
          NODE_VERSION: '22.15.0'

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-serve-${{ needs.build-deb.outputs.version }}-macos-arm64
          path: |
            packaging/dist/*.tar.gz
            packaging/dist/*.sha256
          if-no-files-found: error

  # ── Create GitHub Release ─────────────────────────────────────
  release:
    needs: [build-deb, build-macos]
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve version
        id: version
        run: echo "VERSION=${{ needs.build-deb.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: tui-serve-${{ steps.version.outputs.VERSION }}-amd64-deb
          path: release-artifacts/

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: tui-serve-${{ steps.version.outputs.VERSION }}-macos-arm64
          path: release-artifacts/

      - name: List release artifacts
        run: ls -lh release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-rc') || contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-alpha') }}
          generate_release_notes: true
          files: release-artifacts/*
          body: |
            ## Install (Linux amd64)

            ```bash
            sudo apt install ./tui-serve_${{ steps.version.outputs.VERSION }}_amd64.deb
            /usr/share/doc/tui-serve/install-user-service.sh
            systemctl --user status tui-serve
            ```

            Open `http://<host>:5555` and enter your auth token.

            ## Install (macOS arm64)

            ```bash
            tar xzf tui-serve-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.gz
            cd tui-serve-${{ steps.version.outputs.VERSION }}-macos-arm64
            ./deploy/scripts/install-macos.sh
            ```

            Run diagnostics if needed:

            ```bash
            /usr/local/opt/tui-serve/deploy/scripts/doctor-macos.sh
            ```

            ### What's Changed

            See generated notes below for commit history.
