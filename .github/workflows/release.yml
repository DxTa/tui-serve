name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
  workflow_run:
    workflows: ["Bump Version"]
    types: [completed]
    branches: [main]

permissions:
  contents: write

jobs:
  # ── Build .deb for Linux amd64 ──────────────────────────────
  build-deb:
    # Pin runner image; actual .deb build runs inside packaging/build-deb.sh's
    # ubuntu:20.04 Docker container for glibc compatibility.
    runs-on: ubuntu-24.04
    if: github.event_name != 'workflow_run' || github.event.workflow_run.conclusion == 'success'
    outputs:
      version: ${{ steps.version.outputs.VERSION }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: |
            server/package-lock.json
            tui-web/package-lock.json

      - name: Verify Docker is available
        run: docker --version

      - name: Resolve version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION=$(node -p "require('./server/package.json').version")
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: Create and push tag (if not tag-triggered)
        if: '!startsWith(github.ref, ''refs/tags/v'')'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag -a "v${{ steps.version.outputs.VERSION }}" -m "v${{ steps.version.outputs.VERSION }}"
          git push origin "v${{ steps.version.outputs.VERSION }}"

      - name: Build .deb package
        run: |
          chmod +x packaging/build-deb.sh
          ./packaging/build-deb.sh --docker ${{ steps.version.outputs.VERSION }} amd64
        env:
          NODE_VERSION: '22.15.0'

      - name: Upload .deb artifact
        uses: actions/upload-artifact@v4
        with:
          name: tui-serve-${{ steps.version.outputs.VERSION }}-amd64-deb
          path: packaging/dist/*.deb
          if-no-files-found: error

  # ── Build macOS arm64 bundle ─────────────────────────────────
  # build-macos:
  #   runs-on: macos-14  # Apple Silicon (M1)
  #   env:
