  #       run: |
  #         chmod +x packaging/build-macos.sh
  #         ./packaging/build-macos.sh ${{ steps.version.outputs.VERSION }}
  #       env:
  #         NODE_VERSION: '22.15.0'
  #
  #     - name: Generate SHA256 checksums
  #       run: |
  #         cd packaging/dist
  #         shasum -a 256 *.tar.gz > checksums-macos-arm64.txt
  #         cat checksums-macos-arm64.txt
  #
  #     - name: Upload macOS artifact
  #       uses: actions/upload-artifact@v4
  #       with:
  #         name: tui-serve-${{ steps.version.outputs.VERSION }}-macos-arm64
  #         path: |
  #           packaging/dist/*.tar.gz
  #           packaging/dist/checksums-*.txt
  #         if-no-files-found: error

  # ── Create GitHub Release ─────────────────────────────────────
  release:
    needs: [build-deb]
    runs-on: ubuntu-24.04
    steps:
      - name: Resolve version
        id: version
        run: echo "VERSION=${{ needs.build-deb.outputs.version }}" >> $GITHUB_OUTPUT

      - name: Download .deb artifact
        uses: actions/download-artifact@v4
        with:
          name: tui-serve-${{ steps.version.outputs.VERSION }}-amd64-deb
          path: release-artifacts/

      # - name: Download macOS artifact
      #   uses: actions/download-artifact@v4
      #   with:
      #     name: tui-serve-${{ steps.version.outputs.VERSION }}-macos-arm64
      #     path: release-artifacts/

      - name: List release artifacts
        run: ls -lh release-artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.VERSION }}
          name: Release v${{ steps.version.outputs.VERSION }}
          draft: false
          prerelease: ${{ contains(steps.version.outputs.VERSION, '-rc') || contains(steps.version.outputs.VERSION, '-beta') || contains(steps.version.outputs.VERSION, '-alpha') }}
          generate_release_notes: true
          files: release-artifacts/*
          body: |
            ## Install (Linux amd64)

            ```bash
            sudo apt install ./tui-serve_${{ steps.version.outputs.VERSION }}_amd64.deb
            /usr/share/doc/tui-serve/install-user-service.sh
            systemctl --user status tui-serve
            ```

            Open `http://<host>:5555` and enter your auth token.

            ### macOS (arm64) — coming soon

            ```bash
            tar xzf tui-serve-${{ steps.version.outputs.VERSION }}-macos-arm64.tar.gz
            cd tui-serve-${{ steps.version.outputs.VERSION }}
            ./deploy/scripts/install-macos.sh
            ```

            Run diagnostics if needed:

            ```bash
            /usr/local/opt/tui-serve/deploy/scripts/doctor-macos.sh
            ```

            ### What's Changed

            See generated notes below for commit history.